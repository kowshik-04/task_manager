services:
  postgres:
    image: postgres:16-alpine
    container_name: ttm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: team_task_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d team_task_manager"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ttm-backend
    restart: unless-stopped
    depends_on:
      postgres:
        # Critical: backend waits for postgres to be healthy before starting
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: production
      # Use service name 'postgres' inside Docker network (not localhost)
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/team_task_manager?schema=public
      JWT_SECRET: replace_with_long_random_secret
      JWT_EXPIRES_IN: 1d
      FRONTEND_URL: http://localhost:5173
    ports:
      - "5001:5000"
    networks:
      - app-network
    # Health check: tests if backend is ready to serve traffic
    healthcheck:
      # Fetch /health endpoint; exit 0 if success, 1 if fail
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5000/health').then(r => { if (!r.ok) throw new Error('Health check failed'); }).catch(e => { console.error(e); process.exit(1); })\""]
      interval: 10s        # Check every 10 seconds
      timeout: 5s          # Wait max 5s for response
      retries: 5           # Mark unhealthy after 5 failed checks
      start_period: 15s    # Give app 15s to start before first check

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
